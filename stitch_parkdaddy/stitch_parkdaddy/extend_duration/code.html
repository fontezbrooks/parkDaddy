<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar Component -->
<header class="bg-slate-50 dark:bg-slate-900 sticky top-0 z-50">
<div class="flex items-center w-full px-4 h-16 max-w-7xl mx-auto">
<button class="p-2 mr-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors Active:opacity-80 scale-95 transition-transform">
<span class="material-symbols-outlined text-indigo-900 dark:text-indigo-300">arrow_back</span>
</button>
<h1 class="font-sans antialiased text-indigo-950 dark:text-indigo-50 font-bold tracking-tight text-lg">Extend Parking</h1>
</div>
</header>
<main class="max-w-md mx-auto px-6 py-8 space-y-8">
<!-- Vehicle Summary: Architectural Concierge Style -->
<section class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/15">
<div class="p-6 space-y-4">
<div class="flex justify-between items-start">
<div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">Active Vehicle</span>
<div class="text-3xl font-black tracking-tighter text-primary">ABC-1234</div>
</div>
<div class="bg-primary text-on-primary px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest">Active</div>
</div>
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-xl">schedule</span>
<p class="text-sm font-medium">Current session Ends at <span class="text-on-surface font-bold">11:30 PM</span></p>
</div>
</div>
</section>
<!-- Duration Selection: Precision Primitives -->
<section class="space-y-4">
<h2 class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Select Extension</h2>
<div class="grid grid-cols-2 gap-3">
<!-- Preset Options -->
<button class="h-20 flex flex-col items-center justify-center bg-surface-container-high hover:bg-surface-container-highest transition-colors rounded-xl border border-outline-variant/10">
<span class="text-xl font-bold text-primary">2h</span>
<span class="text-[10px] font-medium text-on-surface-variant">Standard</span>
</button>
<button class="h-20 flex flex-col items-center justify-center bg-primary text-white rounded-xl shadow-lg ring-2 ring-primary ring-offset-2">
<span class="text-xl font-bold">4h</span>
<span class="text-[10px] font-medium opacity-80">Recommended</span>
</button>
<button class="h-20 flex flex-col items-center justify-center bg-surface-container-high hover:bg-surface-container-highest transition-colors rounded-xl border border-outline-variant/10">
<span class="text-xl font-bold text-primary">8h</span>
<span class="text-[10px] font-medium text-on-surface-variant">Full Day</span>
</button>
<button class="h-20 flex flex-col items-center justify-center bg-surface-container-high hover:bg-surface-container-highest transition-colors rounded-xl border border-outline-variant/10">
<span class="text-xl font-bold text-primary">12h</span>
<span class="text-[10px] font-medium text-on-surface-variant">Overnight</span>
</button>
<button class="h-20 flex flex-col items-center justify-center bg-surface-container-high hover:bg-surface-container-highest transition-colors rounded-xl border border-outline-variant/10">
<span class="text-xl font-bold text-primary">24h</span>
<span class="text-[10px] font-medium text-on-surface-variant">Full Cycle</span>
</button>
<!-- Custom Option -->
<button class="h-20 flex flex-col items-center justify-center bg-surface-container-lowest border-2 border-dashed border-outline-variant hover:border-primary transition-all rounded-xl">
<span class="material-symbols-outlined text-primary mb-1">add_circle</span>
<span class="text-[10px] font-bold text-primary uppercase">Custom</span>
</button>
</div>
</section>
<!-- Impact Summary Card: Glassmorphism Tonal Layering -->
<section class="relative bg-surface-container-highest rounded-2xl p-8 overflow-hidden">
<!-- Decorative Gradient Background -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
<div class="relative z-10 space-y-6">
<div class="flex flex-col items-center text-center">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">New Session End</span>
<div class="text-5xl font-black tracking-tighter text-primary">3:30 <span class="text-2xl font-bold">AM</span></div>
<div class="mt-1 px-3 py-0.5 bg-tertiary-fixed text-on-tertiary-fixed rounded-full text-[10px] font-bold uppercase tracking-widest">Tomorrow</div>
</div>
<div class="flex items-start gap-4 p-4 bg-surface-container-lowest/80 backdrop-blur-md rounded-xl border border-outline-variant/20 shadow-sm">
<span class="material-symbols-outlined text-tertiary-container mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-sm leading-relaxed text-on-surface-variant">
                        Extension includes <span class="font-bold text-on-surface">2 more automated renewals</span> to ensure zero-gap protection.
                    </p>
</div>
</div>
</section>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl p-6 border-t border-slate-200/10 z-40">
<div class="max-w-md mx-auto">
<button class="w-full bg-gradient-to-br from-primary to-primary-container h-14 rounded-xl flex items-center justify-center gap-3 shadow-[0_12px_24px_rgba(0,6,102,0.15)] active:scale-95 transition-transform">
<span class="text-white font-bold tracking-tight">Confirm Extension</span>
<span class="material-symbols-outlined text-white">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-200/10 shadow-[0_-12px_24px_rgba(0,0,0,0.08)] rounded-t-3xl hidden md:flex">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors Active:scale-90 duration-200">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-semibold uppercase tracking-widest mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center bg-indigo-900 dark:bg-indigo-500 text-white rounded-2xl p-3 Active:scale-90 duration-200">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-semibold uppercase tracking-widest mt-1">History</span>
</button>
